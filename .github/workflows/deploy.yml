name: Deploy to VPS

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: 54.205.198.31
          username: wisper
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            cd /home/wisper/apps/wisper-server
            git pull origin main
            npm install
            npm run build
            pm2 restart server --update-env
            echo "Deployed successfully"
